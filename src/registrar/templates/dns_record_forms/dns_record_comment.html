<button type="button"
            class="usa-button usa-button--unstyled  margin-top-0"
            data-record-id="{{ record_id }}"
            id="comment-button-{{ record_id }}"
         >

         <span class="usa-sr-only">{{ dns_record.type }} comment for {{ dns_record.name }}</span>
         
         <svg   
             class="usa-icon" 
             aria-hidden="true" 
             focusable="false" 
             role="img"
             width="13"
             >
                    <use href="/public/img/sprite.svg#comment"></use>
                </svg>

                    <svg
                        class="usa-icon" 
                        aria-hidden="true" 
                        focusable="false" 
                        role="img"
                        width="8">
                        <use x-show="!openComments.includes('{{ record_id }}') && showFormId != '{{ record_id }}'" xlink:href="/public/img/sprite.svg#expand_more" ></use>
                        <use x-show="openComments.includes('{{ record_id }}') || showFormId == '{{ record_id }}' " xlink:href="/public/img/sprite.svg#expand_less" ></use>
                    </svg>
            
</button>
