<button type="button"
            class="usa-button usa-button--unstyled dns-comment-button margin-top-05"
            data-record-id="{{ record_id }}"
            data-action="comment"
            aria-label="Toggle to view comment for {{ dns_record.name }}"
            aria-expanded="false"
            :aria-expanded="openComments.includes('{{ record_id }}') ? 'true' : 'false' "
         >
         
         <svg   
             class="usa-icon" 
             aria-hidden="true" 
             focusable="false" 
             role="img"
             >
                    <use href="/public/img/sprite.svg#comment"></use>
                </svg>

                    <svg
                        class="usa-icon" 
                        aria-hidden="true" 
                        focusable="false" 
                        role="img">
                        <use x-show="!openComments.includes('{{ record_id }}')" xlink:href="/public/img/sprite.svg#expand_more" ></use>
                        <use x-show="openComments.includes('{{ record_id }}')" xlink:href="/public/img/sprite.svg#expand_less" ></use>
                    </svg>
            
</button>
