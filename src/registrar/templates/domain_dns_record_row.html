<tr id="dnsrecord-row-{{record_id}}" :class="showFormId == '{{ record_id }}' || openComments.includes('{{record_id}}')? 'hide-td-borders' : ''">
    <td id="dns-type-{{ record_id }}" data-label="Type">
        {{dns_record.type}}


        {% if dns_record.comment %}
            {% include "dns_record_forms/dns_record_comment.html" with dns_record=dns_record %}
        {% endif %}
    </td>
    <td id="dns-name-{{ record_id }}" data-label="Name">
        {{dns_record.name}}
    </td>
    <td id="dns-content-{{ record_id }}" data-label="Content">
        {{dns_record.content|truncatechars:37}}
    </td>
    <td id="dns-ttl-{{ record_id }}" data-label="TTL">
        {{dns_record.ttl}}
    </td>
    <td class="padding-right-0" data-label="Action">
        <div class="tablet:display-flex tablet:flex-row">
            <button 
            type="button"
            class="usa-button usa-button--unstyled margin-right-2 margin-top-0"
            aria-expanded="false"
            :aria-expanded="showFormId == '{{ record_id }}' ? 'true' : 'false'"
            aria-controls="dnsrecord-edit-row-{{ record_id }}"
            aria-label="Edit {{ dns_record.name }}"
            id="edit-button"
            data-record-id="{{ record_id }}"
            data-action="edit"
            >
                <svg class="usa-icon" aria-hidden="true" focusable="false" role="img" width="24">
                <use xlink:href="/public/img/sprite.svg#edit"></use>
                </svg>
                Edit 
                <span class="usa-sr-only">{{ dns_record.type }} record for {{ dns_record.name }}</span>
                    <svg
                        aria-label="Access edit form"
                        class="usa-icon" 
                        aria-hidden="true" 
                        focusable="false" 
                        role="img"
                        width="8">
                        <use x-show="showFormId !='{{ record_id }}' " xlink:href="/public/img/sprite.svg#expand_more" ></use>
                        <use x-show="showFormId == '{{ record_id }}' " xlink:href="/public/img/sprite.svg#expand_less" ></use>
                    </svg>
            
            </button>
            <a
                role="button"
                id="button-trigger-delete-dnsrecord-{{ record_id }}"
                class="usa-button usa-button--unstyled text-underline margin-top-2 line-height-sans-5 text-secondary visible-mobile-flex"
                >
                <svg class="usa-icon" aria-hidden="true" focusable="false" role="img" width="24">
                    <use xlink:href="/public/img/sprite.svg#delete"></use>
                </svg>
                Delete
            </a>

            <div class="usa-accordion usa-accordion--more-actions margin-right-2 hidden-mobile-flex">
                <div class="usa-accordion__heading">
                <button
                    type="button"
                    class="usa-button usa-button--unstyled usa-button--with-icon usa-accordion__button usa-button--more-actions margin-top-2px"
                    aria-expanded="false"
                    aria-controls="more-actions-dnsrecord-{{ record_id }}"
                    aria-label="More Actions for DNS record"
                >
                    <svg class="usa-icon" aria-hidden="true" focusable="false" role="img" width="24">
                    <use xlink:href="/public/img/sprite.svg#more_vert"></use>
                    </svg>
                </button>
                </div>
                <div id="more-actions-dnsrecord-{{ record_id }}" class="usa-accordion__content usa-prose shadow-1 left-auto right-neg-1" hidden>
                <h2>More options</h2>
                <button
                    type="button"
                    class="usa-button usa-button--unstyled text-underline late-loading-modal-trigger margin-top-2 line-height-sans-5 text-secondary"
                    aria-label="Delete DNS record from Cloudflare"
                >
                    Delete
                </button>
                </div>
            </div>
        </div>
    </td>
</tr>
