<tr id="dnsrecord-row-{{record_id}}" :class="showFormId == '{{ record_id }}' || openComments.includes('{{record_id}}')? 'hide-td-borders' : ''">
    <td id="dns-type-{{ record_id }}" data-label="Type">
        <div class="tablet:display-flex tablet:flex-align-baseline">
            <span>
                {{dns_record.type}}
            </span>

         {% if dns_record.comment %}
            <span class="margin-left-auto">
            {% include "dns_record_forms/dns_record_comment.html" with dns_record=dns_record %}
                </span>
        {% endif %}
        </div>

    </td>
    <td id="dns-name-{{ record_id }}" data-label="Name">
        {{dns_record.name}}
    </td>
    <td id="dns-content-{{ record_id }}" data-label="Content">
        {{dns_record.content|truncatechars:37}}
    </td>
    <td id="dns-ttl-{{ record_id }}" data-label="TTL">
        {{ dns_record.ttl_display }}
    </td>
    <td class="padding-right-0" data-label="Action">
        <div class="tablet:display-flex tablet:flex-row">
            <button
            type="button"
            id="dnsrecord-edit-button-{{ record_id }}"
            class="usa-button usa-button--unstyled margin-right-05"
            aria-expanded="false"
            :aria-expanded="showFormId == '{{ record_id }}' ? 'true' : 'false'"
            aria-controls="dnsrecord-edit-row-{{ record_id }}"
            aria-label="Edit {{ dns_record.name }}"
            data-record-id="{{ record_id }}"
            data-action="edit"
            >
                <svg class="usa-icon" aria-hidden="true" focusable="false" role="img" width="24">
                <use xlink:href="/public/img/sprite.svg#edit"></use>
                </svg>
                Edit
                <span class="usa-sr-only">{{ dns_record.type }} record for {{ dns_record.name }}</span>
                    <svg
                        class="usa-icon margin-top-05"
                        aria-hidden="true"
                        focusable="false"
                        role="img"
                       >
                        <use x-show="showFormId !='{{ record_id }}' " xlink:href="/public/img/sprite.svg#expand_more" ></use>
                        <use x-show="showFormId == '{{ record_id }}' " xlink:href="/public/img/sprite.svg#expand_less" ></use>
                    </svg>

            </button>
                <!-- hidden submit button, we'll click this from the modal confirm -->
                <button
                    hx-post="{% url 'domain-dns-records' domain_pk=domain.pk %}"
                    hx-include="input"
                    hx-target="closest tr"
                    hx-swap="outerHTML"
                    id="delete-submit-{{ record_id }}" data-record-id="{{ record_id }}"
                    class="display-none"
                    aria-hidden="true">
                    <input type="hidden" name="id" value="{{ record_id }}">
                    <input type="hidden" name="delete_record" value="1">
                </button>
                <!-- visible delete button that triggers modal -->
                <button
                        type="button"
                        id="row-delete-button-{{ record_id }}"
                        class="usa-button usa-button--unstyled usa-button--with-icon margin-top-2px text-secondary js-dnsrecord-delete"
                        data-record-id="{{ record_id }}"
                    >
                        <svg class="usa-icon" role="img" aria-labelledby="row-delete-img-{{ record_id }}" focusable="false" role="img" width="24">
                            <title id="row-delete-img-{{ record_id }}">Delete {{ dns_record.name }}</title>
                            <use xlink:href="/public/img/sprite.svg#delete"></use>
                        </svg>
                </button>
        </div>
    </td>
</tr>
