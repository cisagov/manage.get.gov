{% load static field_helpers url_helpers %}

{% csrf_token %}
<h2>Add record</h2>

<div class="grid-row grid-gap">
    <div class="grid-col-3">
        {% input_with_errors form.type %}
    </div>
</div>

<div x-cloak x-show="recordType">
  
    {% if partial %}
        {% include partial with form=form %}
    {% else %}
    <div id="record-type-container">
        {% include "dns_record_forms/base_record_form.html" with form=form %}
    </div>
    {% endif %}
    {% input_with_errors form.comment %}

    <button
        type="reset"
        class="usa-button usa-button--outline"
        x-on:click="showFormId = null"
    >
        Cancel
    </button>
    <button
            class="usa-button"
        >
            Save
    </button>
</div>
