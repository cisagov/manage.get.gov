{% load static field_helpers url_helpers %}

{% csrf_token %}
<h2>Add record</h2>

<div class="grid-row grid-gap">
    <div class="grid-col-3">
        {% input_with_errors form.type %}
    </div>
</div>

<div x-cloak x-show="recordType">
    <div x-show="recordType === 'A' || recordType === 'AAAA' ">
         {% include "dns_record_partials/_a_record_form.html" %}
    </div>

    <div x-show="recordType == 'TXT' ">
         {% include "dns_record_partials/_txt_record_form.html" %}
    </div>

    {% input_with_errors form.comment %}

    <button
        type="reset"
        class="usa-button usa-button--outline"
        x-on:click="showFormId = null"
    >
        Cancel
    </button>
    <button
            class="usa-button"
        >
            Save
    </button>
</div>
